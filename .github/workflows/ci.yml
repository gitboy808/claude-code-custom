name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-statusline:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Verify statusline generation
        run: python3 scripts/verify_context.py
        shell: bash
